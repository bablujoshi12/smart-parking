{% extends "base.html" %} {% block content %}

<div class="card shadow p-4 mx-auto" style="max-width: 420px">
  <h4 class="mb-3 text-center">Verify OTP</h4>

  <form method="POST" action="{{ url_for('verify') }}">
    <div class="mb-3">
      <label class="form-label">OTP sent to {{ phone }}</label>

      <input
        type="text"
        name="otp"
        class="form-control"
        placeholder="Enter OTP"
        required
      />
    </div>

    <button type="submit" class="btn btn-success w-100">Verify</button>
  </form>

  <form method="POST" action="{{ url_for('resend') }}" class="mt-3 text-center">
    <button type="submit" class="btn btn-link">Resend OTP</button>
  </form>
</div>

{% endblock %}
